{% extends "layout.html" %}

{% block title %}
   TweetBar | Login
{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in py-5">
    <div class="col-md-5">
        <div class="glass p-5">
            <h2 class="text-white fw-bold mb-4 text-center">Welcome Back</h2>
            <p class="text-muted text-center mb-5">Login to your TweetBar account to continue.</p>
            
            <form method="post" class="modern-form">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold small text-uppercase">{{ field.label }}</label>
                    <div class="modern-input-wrapper">
                        {{ field }}
                    </div>
                </div>
                {% endfor %}

                <div class="d-grid mt-5">
                    <button class="btn btn-primary-custom btn-lg" type="submit">Login to Account</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted small">Don't have an account? <a href="{% url 'register' %}" class="text-primary-custom text-decoration-none fw-bold">Register Here</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    .modern-form input {
        width: 100%;
        background: rgba(15, 23, 42, 0.5) !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 12px !important;
        padding: 0.75rem 1rem !important;
        color: white !important;
        transition: all 0.3s ease;
    }
    .modern-form input:focus {
        border-color: #818cf8 !important;
        box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1) !important;
        outline: none;
    }
</style>
{% endblock %}
